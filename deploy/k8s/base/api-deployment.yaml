apiVersion: apps/v1
kind: Deployment
metadata:
  name: shanxi-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shanxi-api
  template:
    metadata:
      labels:
        app: shanxi-api
    spec:
      containers:
        - name: api
          image: shanxi-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: shanxi-api
spec:
  type: ClusterIP
  selector:
    app: shanxi-api
  ports:
    - port: 4000
      targetPort: 4000
