apiVersion: apps/v1
kind: Deployment
metadata:
  name: shanxi-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shanxi-web
  template:
    metadata:
      labels:
        app: shanxi-web
    spec:
      containers:
        - name: web
          image: shanxi-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5050
---
apiVersion: v1
kind: Service
metadata:
  name: shanxi-web
spec:
  type: NodePort
  selector:
    app: shanxi-web
  ports:
    - port: 5050
      targetPort: 5050
      nodePort: 30050
