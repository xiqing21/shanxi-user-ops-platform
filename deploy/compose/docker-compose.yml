services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls
      - http://0.0.0.0:2379
      - --data-dir
      - /etcd
    volumes:
      - etcd-data:/etcd

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "19001:9001"
    volumes:
      - minio-data:/minio_data

  milvus:
    image: milvusdb/milvus:v2.6.17
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      - etcd
      - minio

  ai:
    build:
      context: ../..
      dockerfile: services/ai/Dockerfile
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      VECTOR_BACKEND: ${VECTOR_BACKEND:-milvus}
      VECTOR_CONNECT_RETRIES: ${VECTOR_CONNECT_RETRIES:-30}
      VECTOR_CONNECT_INTERVAL_SECONDS: ${VECTOR_CONNECT_INTERVAL_SECONDS:-2}
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      MILVUS_COLLECTION: shanxi_metadata_assets
    ports:
      - "8000:8000"
    depends_on:
      - milvus

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      AI_SERVICE_URL: http://ai:8000
    ports:
      - "4000:4000"
    volumes:
      - ../../data:/app/data
    depends_on:
      - ai

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_TARGET: http://api:4000
    ports:
      - "${WEB_PORT:-5051}:5050"
    depends_on:
      - api

volumes:
  etcd-data:
  minio-data:
  milvus-data:
